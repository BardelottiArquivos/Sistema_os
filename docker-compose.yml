version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=sistema
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=2530
    ports:
      - "5432:5432"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=sistema
      - DB_USER=postgres
      - DB_PASSWORD=2530
      - DB_HOST=db
      - DB_PORT=5432
      - DEBUG=True
    depends_on:
      - db

volumes:
  postgres_data: