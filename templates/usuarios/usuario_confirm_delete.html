{% extends 'base.html' %}

{% block title %}Excluir Usuário{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header bg-danger text-white">
        <h3>Confirmar Exclusão</h3>
    </div>
    <div class="card-body">
        <p>Tem certeza que deseja excluir <strong>{{ usuario.get_full_name|default:usuario.username }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Excluir</button>
            <a href="{% url 'usuario_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
