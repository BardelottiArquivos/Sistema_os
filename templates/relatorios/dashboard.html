{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Relatórios{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3>Relatórios</h3>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-6">
                <div class="card mb-3">
                    <div class="card-header bg-primary text-white">
                        <h5>Relatório por OS</h5>
                    </div>
                    <div class="card-body">
                        <form method="get" action="{% url 'relatorios:os_pdf' 0 %}">
                            <div class="mb-3">
                                <label class="form-label">Número da OS</label>
                                <input type="text" name="os_numero" id="os_numero" class="form-control" placeholder="Ex: 2024/0001">
                            </div>
                            <button type="button" class="btn btn-primary" onclick="gerarRelatorioOS()">Gerar PDF</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card mb-3">
                    <div class="card-header bg-success text-white">
                        <h5>Relatório por Período</h5>
                    </div>
                    <div class="card-body">
                        <form method="get" action="{% url 'relatorios:periodo_pdf' %}">
                            <div class="row">
                                <div class="col-md-6">
                                    <label class="form-label">Data Início</label>
                                    <input type="date" name="data_inicio" class="form-control" value="{{ ultimo_mes|date:'Y-m-d' }}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Data Fim</label>
                                    <input type="date" name="data_fim" class="form-control" value="{{ hoje|date:'Y-m-d' }}">
                                </div>
                            </div>
                            <div class="mt-3">
                                <label class="form-label">Status</label>
                                <select name="status" class="form-select">
                                    <option value="">Todos</option>
                                    <option value="aberta">Aberta</option>
                                    <option value="em_andamento">Em Andamento</option>
                                    <option value="concluida">Concluída</option>
                                    <option value="cancelada">Cancelada</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success mt-3">Gerar PDF</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function gerarRelatorioOS() {
    const osNumero = document.getElementById('os_numero').value;
    if (!osNumero) {
        alert('Digite o número da OS');
        return;
    }
    // Buscar o ID da OS pelo número
    fetch(`/api/buscar-os/?numero=${osNumero}`)
        .then(response => response.json())
        .then(data => {
            if (data.id) {
                window.open(`/relatorios/os/${data.id}/pdf/`, '_blank');
            } else {
                alert('OS não encontrada');
            }
        })
        .catch(error => {
            console.error('Erro:', error);
            alert('Erro ao buscar OS');
        });
}
</script>
{% endblock %}
